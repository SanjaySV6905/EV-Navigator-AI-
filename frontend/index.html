<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Router (Python Backend)</title>
    <link rel="icon" type="image/jpeg" href="images/icon.jpg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 overflow-hidden">

    <div class="sidebar bg-white p-6 rounded-lg shadow-xl">
        <h1 class="text-2xl font-bold text-green-600 mb-4">EV Router AI</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Select City</label>
                <select id="city" class="w-full mt-1 p-2 border rounded">
                    <option value="Bangalore">Bangalore</option>
                    <option value="Chennai">Chennai</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-bold text-gray-700 uppercase">Start Location</label>
                <input type="text" id="startAddr" placeholder="Click map or type..." class="w-full p-2 border rounded text-sm" autocomplete="off">
                <div id="startSuggestions" class="suggestions-list hidden"></div>
                <input type="hidden" id="startLat">
                <input type="hidden" id="startLon">
            </div>

            <div class="relative">
                <label class="block text-xs font-bold text-gray-700 uppercase">Destination</label>
                <input type="text" id="endAddr" placeholder="Click map or type..." class="w-full p-2 border rounded text-sm" autocomplete="off">
                <div id="endSuggestions" class="suggestions-list hidden"></div>
                <input type="hidden" id="endLat">
                <input type="hidden" id="endLon">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-700">Capacity (kWh)</label>
                    <input type="number" id="batteryCap" value="40" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700">Current Level (%)</label>
                    <input type="number" id="batteryLevel" value="50" class="w-full p-2 border rounded">
                </div>
            </div>

            <div class="space-y-2">
                <div>
                    <label class="block text-xs font-bold text-gray-700">EV Car Type</label>
                    <select id="vehicleType" onchange="updateVehicleLoad()" class="w-full mt-1 p-2 border rounded text-sm">
                        <option value="800">Lightweight (e.g. Tata Tiago EV) ~800 kg</option>
                        <option value="1200" selected>Medium (e.g. Nexon EV, MG ZS) ~1200 kg</option>
                        <option value="1800">Heavy (e.g. Kia EV6, BYD Atto) ~1800 kg</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700">No. of Passengers</label>
                    <select id="passengerCount" onchange="updateVehicleLoad()" class="w-full p-2 border rounded text-sm">
                        <option value="1" selected>1 passenger</option>
                        <option value="2">2 passengers</option>
                        <option value="3">3 passengers</option>
                        <option value="4">4 passengers</option>
                        <option value="5">5 passengers</option>
                    </select>
                </div>
                <p id="vehicleLoadDisplay" class="text-xs text-gray-400">Est. load: 1270 kg (1200 kg car + 1x70 kg)</p>
                <input type="hidden" id="vehicleLoad" value="1270">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">Driving Speed</label>
                <div class="grid grid-cols-3 gap-1">
                    <button onclick="setSpeed(40, this)" id="speedSlow"
                        class="speed-btn py-2 px-1 rounded border-2 border-yellow-400 bg-yellow-50 text-yellow-700 text-xs font-bold transition">
                        Slow<br><span class="text-xs font-normal">40 km/h</span>
                    </button>
                    <button onclick="setSpeed(70, this)" id="speedMedium"
                        class="speed-btn py-2 px-1 rounded border-2 border-blue-600 text-xs font-bold transition"
                        style="background:#3b82f6;color:#fff;border-color:#1d4ed8;">
                        Medium<br><span class="text-xs font-normal">70 km/h</span>
                    </button>
                    <button onclick="setSpeed(100, this)" id="speedFast"
                        class="speed-btn py-2 px-1 rounded border-2 border-red-400 bg-red-50 text-red-700 text-xs font-bold transition">
                        Fast<br><span class="text-xs font-normal">100 km/h</span>
                    </button>
                </div>
                <input type="hidden" id="selectedSpeed" value="70">
            </div>

            <button id="getRouteBtn" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 font-bold flex justify-center items-center gap-2 transition">
                <span>Get Optimized Route</span>
                <span id="spinner" class="loader hidden"></span>
            </button>

            <div id="results" class="hidden border-t pt-4 mt-4 space-y-2">
                <div class="flex justify-between text-sm"><span>Distance:</span><span id="resDist" class="font-bold">0 km</span></div>
                <div class="flex justify-between text-sm"><span>Est. Drive Time:</span><span id="resDuration" class="font-bold">0 min</span></div>
                <div class="flex justify-between text-sm"><span>Depart At:</span><span id="resDepartTime" class="font-bold text-gray-500">--</span></div>
                <div class="flex justify-between text-sm"><span>Arrive At:</span><span id="resArrivalTime" class="font-bold text-green-600">--</span></div>
                <div class="flex justify-between text-sm"><span>Predicted Usage:</span><span id="resEnergy" class="font-bold">0 kWh</span></div>
                <div class="flex justify-between text-sm"><span>Remaining at Dest:</span><span id="resRemaining" class="font-bold">0%</span></div>
                <div id="resAlert" class="p-2 rounded mt-2 text-center text-sm font-bold"></div>
            </div>

            <div id="mapHint" class="text-xs text-gray-500 mt-2 text-center">Click map to set Start point</div>
        </div>
    </div>

    <div id="map"></div>
    <div id="stationCount" class="stat-badge hidden">Loading Stations...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/stations.js"></script>
    <script src="js/autocomplete.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/main.js"></script>

    <script>
    function setSpeed(kmh, btn) {
        document.getElementById('selectedSpeed').value = kmh;
        var slow = document.getElementById('speedSlow');
        var med  = document.getElementById('speedMedium');
        var fast = document.getElementById('speedFast');
        slow.style.background = '#fefce8'; slow.style.color = '#a16207'; slow.style.borderColor = '#facc15';
        med.style.background  = '#eff6ff'; med.style.color  = '#1d4ed8'; med.style.borderColor  = '#3b82f6';
        fast.style.background = '#fef2f2'; fast.style.color = '#b91c1c'; fast.style.borderColor = '#f87171';
        if (kmh === 40)       { slow.style.background = '#facc15'; slow.style.color = '#fff'; slow.style.borderColor = '#ca8a04'; }
        else if (kmh === 70)  { med.style.background  = '#3b82f6'; med.style.color  = '#fff'; med.style.borderColor  = '#1d4ed8'; }
        else                  { fast.style.background = '#ef4444'; fast.style.color = '#fff'; fast.style.borderColor = '#b91c1c'; }
    }

    function updateVehicleLoad() {
        var car  = parseInt(document.getElementById('vehicleType').value) || 1200;
        var pax  = parseInt(document.getElementById('passengerCount').value) || 1;
        var load = car + pax * 70;
        document.getElementById('vehicleLoad').value = load;
        document.getElementById('vehicleLoadDisplay').innerText = 'Est. load: ' + load + ' kg (' + car + ' kg car + ' + pax + 'x70 kg)';
        if (typeof routeLayer !== 'undefined' && routeLayer) { calculateRoute(); }
    }

    document.addEventListener('DOMContentLoaded', updateVehicleLoad);
    </script>
</body>
</html>
